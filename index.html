<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>
<style>
body{
    font-family: Arial;
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    width:350px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    width:100%;
    padding:10px;
    background:#1877f2;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
    <h2>Đăng nhập</h2>

    <input type="text" placeholder="Email hoặc số điện thoại">

    <input type="password" placeholder="Mật khẩu">

    <button>Đăng nhập</button>
</div>
</body>
</html>
